flutter_native_splash:
  # Light splash: blue bird on a clean white canvas.
  color: "#FFFFFF"
  image: assets/branding/splash.png
  # Dark mode splash on the app's dark canvas.
  color_dark: "#0E1320"
  image_dark: assets/branding/splash.png

  # Android 12+ uses the system splash API (icon is masked to a circle).
  android_12:
    image: assets/branding/splash_android12.png
    color: "#FFFFFF"
    image_dark: assets/branding/splash_android12.png
    color_dark: "#0E1320"

  android: true
  ios: true
  web: false
